[package]
name = "rivrs-sparse"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
description = "Sparse linear algebra solvers for the Rivrs symbolic-numeric framework"
license = "Apache-2.0"
categories = ["science", "mathematics"]
keywords = ["linear-algebra", "sparse-solver", "numerical-computing", "rust"]

[dependencies]
faer = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = { version = "0.8", optional = true }
rand_distr = { version = "0.4", optional = true }

[features]
test-util = ["rand", "rand_distr"]

[dev-dependencies]
approx = "0.5"
criterion = "0.5"
rand = "0.8"
rand_distr = "0.4"
rivrs-sparse = { path = ".", features = ["test-util"] }

[[bench]]
name = "matrix_loading"
harness = false

[profile.dev]
opt-level = 3

[profile.test]
opt-level = 3

[profile.bench]
opt-level = 3
