version: '3.8'

services:
  rivrs-linalg-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        RUST_VERSION: "1.93.0"
        CLAUDE_CODE_VERSION: "latest"
        GIT_USER_NAME: "${GIT_USER_NAME:-Claude Code}"
        GIT_USER_EMAIL: "${GIT_USER_EMAIL:-claude@example.com}"
    # platform: not set — Docker Compose defaults to the host's native architecture
    # (linux/arm64 on macOS, linux/amd64 on Linux). Override via DOCKER_DEFAULT_PLATFORM if needed.
    image: rivrs-linalg-dev:latest
    container_name: rivrs-linalg-dev

    volumes:
      - workspace:/workspace  # Workspace volume (git clone creates rivrs-linalg/ inside)
      - cargo-cache:/home/node/.cargo/registry
      - sccache-cache:/home/node/.cache/sccache
      - claude-config:/home/node/.claude
      # VS Code Dev Containers handles gh credentials via devcontainer.json mounts
      # For docker-compose CLI usage, uncomment the line below:
      # - ${HOME}/.config/gh:/home/node/.config/gh:ro

    environment:
      - RUSTFLAGS=-C target-cpu=native
      - CARGO_BUILD_JOBS=8
      - RUSTC_WRAPPER=sccache
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - CARGO_REGISTRY_TOKEN=${CARGO_REGISTRY_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - TERM=${TERM:-xterm-256color}

    # CAP_PERFMON + unconfined seccomp allow perf stat/record inside the
    # container for hardware performance counter profiling.
    cap_add:
      - PERFMON
    security_opt:
      - seccomp:unconfined

    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

    # Use default entrypoint + CMD from Dockerfile (runs welcome.sh + bash)
    # command: sleep infinity

    stdin_open: true
    tty: true

volumes:
  workspace:
    name: rivrs-linalg-workspace
  cargo-cache:
    name: rivrs-linalg-cargo-cache
  sccache-cache:
    name: rivrs-linalg-sccache-cache
  claude-config:
    name: rivrs-linalg-claude-config
