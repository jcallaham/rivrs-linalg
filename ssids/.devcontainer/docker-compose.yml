version: '3.8'

services:
  rivrs-linalg-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        RUST_VERSION: "1.93.0"
        CLAUDE_CODE_VERSION: "latest"
        GIT_USER_NAME: "${GIT_USER_NAME:-Claude Code}"
        GIT_USER_EMAIL: "${GIT_USER_EMAIL:-claude@example.com}"
    platform: linux/arm64
    image: rivrs-linalg-dev:latest
    container_name: rivrs-linalg-dev

    volumes:
      - workspace:/workspace/rivrs-linalg  # Isolated workspace (sandboxed from host)
      - cargo-cache:/root/.cargo/registry
      - sccache-cache:/root/.cache/sccache
      - claude-config:/root/.claude
      # VS Code Dev Containers handles gh credentials via devcontainer.json mounts
      # For docker-compose CLI usage, uncomment the line below:
      # - ${HOME}/.config/gh:/root/.config/gh:ro

    environment:
      - RUSTFLAGS=-C target-cpu=native
      - CARGO_BUILD_JOBS=8
      - RUSTC_WRAPPER=sccache
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/root/.claude
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

    command: sleep infinity

    stdin_open: true
    tty: true

volumes:
  workspace:
    name: rivrs-linalg-workspace
  cargo-cache:
    name: rivrs-linalg-cargo-cache
  sccache-cache:
    name: rivrs-linalg-sccache-cache
  claude-config:
    name: rivrs-linalg-claude-config
